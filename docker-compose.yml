services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep relative by default so nginx proxies /api to the backend service.
        # Override only if you serve the backend from a different origin.
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: genial-quizz-frontend:latest
    container_name: genial-quizz-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
